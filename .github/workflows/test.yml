name: Closed-Loop Orchestrator CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Code Quality & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv and tools
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: Run Ruff Linter
        run: |
          uvx ruff check closed-loop/tdd

      - name: Run Ruff Formatter Check
        run: |
          uvx ruff format --check closed-loop/tdd

      - name: Run Security Scan (Bandit)
        run: |
          uvx bandit -r closed-loop/tdd/ -x closed-loop/tdd/test_closed_loop.py

      - name: Run ShellCheck on Runbooks
        run: |
          shellcheck closed-loop/tdd/runbooks/*.sh

  test:
    name: Unit Tests & Coverage
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11']
    defaults:
      run:
        working-directory: closed-loop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt pytest pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest tdd/test_closed_loop.py --cov=tdd --cov-report=term-missing
