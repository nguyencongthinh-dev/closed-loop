name: Closed-Loop Orchestrator CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Python Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lab-closed-loop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv-action@v5
        with:
          version: 'latest'
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt

      - name: Run unit tests
        run: |
          python -m unittest tdd/test_closed_loop.py
