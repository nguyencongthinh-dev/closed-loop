global:
  scrape_interval: 10s
  evaluation_interval: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "/etc/prometheus/alert_rules.yml"

scrape_configs:
  - job_name: "frontend"
    static_configs:
      - targets: ["frontend:8080"]
        labels:
          service: "frontend"

  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8080"]
        labels:
          service: "api-gateway"

  - job_name: "payment-svc"
    static_configs:
      - targets: ["payment-svc:8080"]
        labels:
          service: "payment-svc"

  - job_name: "inventory-svc"
    static_configs:
      - targets: ["inventory-svc:8080"]
        labels:
          service: "inventory-svc"

  - job_name: "checkout-svc"
    static_configs:
      - targets: ["checkout-svc:8080"]
        labels:
          service: "checkout-svc"

  - job_name: "closed-loop"
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          service: "closed-loop-orchestrator"
